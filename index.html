<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限剧本杀 | Infinite Scenario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 1.2em;
            color: #888;
        }

        /* 玩家登录界面 */
        .login-screen {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
        }

        .login-screen h2 {
            color: #e94560;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .player-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #e94560;
            border-radius: 8px;
            color: #e0e0e0;
            margin-bottom: 20px;
            outline: none;
        }

        .player-input::placeholder {
            color: #888;
        }

        .player-input:focus {
            border-color: #ff6b8a;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            background: #ff6b8a;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #e94560;
        }

        .btn-secondary:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        /* 玩家选择列表 */
        .player-list {
            margin-top: 30px;
            text-align: left;
        }

        .player-list h3 {
            color: #888;
            margin-bottom: 15px;
            text-align: center;
        }

        .player-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-item:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .player-item.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: bold;
            color: #e94560;
            font-size: 1.1em;
        }

        .player-stats {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }

        .player-delete {
            color: #ff4444;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .player-delete:hover {
            background: rgba(255, 68, 68, 0.2);
        }

        /* 主菜单 */
        .main-menu {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }

        .main-menu h2 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .current-player {
            color: #888;
            margin-bottom: 30px;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            padding: 20px 40px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #e94560;
            border-radius: 10px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn:hover {
            background: rgba(233, 69, 96, 0.2);
            transform: translateX(10px);
        }

        .menu-btn .icon {
            font-size: 1.5em;
        }

        .menu-btn .info {
            flex: 1;
        }

        .menu-btn .title {
            font-weight: bold;
            color: #e94560;
        }

        .menu-btn .desc {
            font-size: 0.9em;
            color: #888;
        }

        .menu-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .menu-btn:disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.05);
        }

        /* 剧本选择 */
        .scenario-select {
            max-width: 800px;
            margin: 30px auto;
        }

        .scenario-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .scenario-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scenario-card:hover {
            border-color: #e94560;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .scenario-card .title {
            font-size: 1.3em;
            color: #e94560;
            margin-bottom: 10px;
        }

        .scenario-card .type {
            display: inline-block;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .scenario-card .desc {
            color: #888;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .scenario-card .meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #666;
        }

        /* 游戏容器 */
        .game-container {
            display: none;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
        }

        .quest-panel {
            background: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            margin-bottom: 20px;
        }

        .quest-panel h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .timer {
            background: #e94560;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .scene-container {
            margin-bottom: 20px;
        }

        .scene-image {
            width: 100%;
            height: 300px;
            background: #2a2a4a;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .scene-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .system-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            border: 1px solid #00ff00;
        }

        .scene-description {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .scene-description p {
            font-size: 1.1em;
            line-height: 1.8;
        }

        .npc-panel {
            margin-bottom: 20px;
        }

        .npc-panel h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .npc-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #e94560;
        }

        .npc-name {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 5px;
        }

        .npc-role {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .choices-container {
            margin-top: 30px;
        }

        .choices-container h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: rgba(233, 69, 96, 0.1);
            border: 2px solid #e94560;
            border-radius: 8px;
            color: #e0e0e0;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }

        .choice-btn:hover {
            background: #e94560;
            color: white;
            transform: translateX(5px);
        }

        .choice-btn.danger {
            border-color: #ff4444;
        }

        .choice-btn.danger:hover {
            background: #ff4444;
        }

        .choice-btn.hidden {
            border-color: #ffd700;
            opacity: 0.8;
        }

        .choice-btn.hidden:hover {
            background: #ffd700;
            color: #1a1a2e;
        }

        .player-status {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .status-item {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }

        .status-label {
            color: #e94560;
            font-weight: bold;
        }

        /* 存档菜单 */
        .save-menu {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .save-menu h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .save-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .save-slot {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-slot:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .save-slot.occupied {
            border-color: #00ff88;
        }

        .save-slot-number {
            font-size: 1.2em;
            color: #e94560;
            margin-bottom: 5px;
        }

        .save-slot-info {
            font-size: 0.8em;
            color: #888;
        }

        .ending-screen {
            display: none;
            text-align: center;
            padding: 50px 20px;
        }

        .ending-screen h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .ending-screen.ending-good h1 {
            color: #00ff88;
        }

        .ending-screen.ending-bad h1 {
            color: #ff4444;
        }

        .ending-screen.ending-hidden h1 {
            color: #ffd700;
        }

        .ending-description {
            font-size: 1.2em;
            margin: 30px 0;
            line-height: 1.8;
        }

        .unlocked-skill {
            background: rgba(233, 69, 96, 0.1);
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #ff6b8a;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            z-index: 1000;
        }

        .back-btn:hover {
            background: #e94560;
        }

        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .save-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回按钮 -->
        <button class="back-btn" id="back-btn" style="display: none;" onclick="goBack()">← 返回</button>

        <div class="header">
            <h1>🎬 无限剧本杀</h1>
            <p class="subtitle">Infinite Scenario - 沉浸式剧本游戏</p>
        </div>

        <!-- 1. 玩家登录界面 -->
        <div id="login-screen" class="login-screen">
            <h2>👤 选择身份</h2>
            <input type="text" class="player-input" id="new-player-name" placeholder="输入新玩家名称..." maxlength="20">
            <button class="btn" onclick="createNewPlayer()">创建新玩家</button>
            <button class="btn btn-secondary" onclick="createGuestPlayer()">游客模式</button>
            
            <div class="player-list" id="player-list">
                <h3>或选择已有玩家</h3>
                <div id="existing-players"></div>
            </div>
        </div>

        <!-- 2. 主菜单 -->
        <div id="main-menu" class="main-menu" style="display: none;">
            <h2>🎮 主菜单</h2>
            <p class="current-player">当前玩家：<span id="current-player-name"></span></p>
            
            <div class="menu-options">
                <button class="menu-btn" onclick="continueGame()">
                    <span class="icon">▶️</span>
                    <div class="info">
                        <div class="title">继续游戏</div>
                        <div class="desc">读取上次存档，继续冒险</div>
                    </div>
                </button>
                
                <button class="menu-btn" onclick="showScenarioSelect()">
                    <span class="icon">📖</span>
                    <div class="info">
                        <div class="title">新游戏</div>
                        <div class="desc">选择剧本，开始新的冒险</div>
                    </div>
                </button>
                
                <button class="menu-btn" onclick="showSaveMenu()">
                    <span class="icon">💾</span>
                    <div class="info">
                        <div class="title">存档管理</div>
                        <div class="desc">管理你的存档记录</div>
                    </div>
                </button>
                
                <button class="menu-btn" onclick="switchPlayer()">
                    <span class="icon">🔄</span>
                    <div class="info">
                        <div class="title">切换玩家</div>
                        <div class="desc">切换到其他玩家账户</div>
                    </div>
                </button>
            </div>
        </div>

        <!-- 3. 剧本选择 -->
        <div id="scenario-select" class="scenario-select" style="display: none;">
            <h2 style="text-align: center; color: #e94560;">📖 选择剧本</h2>
            <div class="scenario-grid" id="scenario-grid"></div>
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-secondary" onclick="showMainMenu()">返回主菜单</button>
            </div>
        </div>

        <!-- 4. 存档管理 -->
        <div id="save-menu" class="save-menu" style="display: none; max-width: 600px; margin: 30px auto;">
            <h3>💾 存档管理</h3>
            <p style="color: #888; margin-bottom: 15px;">点击空槽位存档，点击已有存档读取</p>
            <div class="save-grid" id="save-slots"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="showMainMenu()">返回主菜单</button>
            </div>
        </div>

        <!-- 5. 游戏界面 -->
        <div id="loading" class="loading" style="display: none;">加载剧本中...</div>

        <div id="game-container" class="game-container">
            <div class="main-content">
                <!-- Quest Info -->
                <div class="quest-panel">
                    <h3>🎯 主任务</h3>
                    <p id="main-quest-text">任务描述</p>
                    <div style="margin-top: 10px;">
                        <span class="timer" id="quest-timer">72:00:00</span>
                    </div>
                </div>

                <!-- Scene -->
                <div class="scene-container" id="scene-container">
                    <div class="scene-image">
                        <img id="scene-img" src="" alt="场景">
                        <div class="system-overlay" id="system-overlay"></div>
                    </div>
                    <div class="scene-description">
                        <p id="scene-text"></p>
                    </div>
                </div>

                <!-- NPCs -->
                <div class="npc-panel" id="npc-panel">
                    <h3>🎭 在场人物</h3>
                    <div id="npc-list"></div>
                </div>

                <!-- Choices -->
                <div class="choices-container">
                    <h3>➤ 你的选择：</h3>
                    <div id="choices" class="choices"></div>
                </div>

                <!-- 手动存档按钮 -->
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-secondary" onclick="quickSave()">💾 快速存档</button>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="player-status">
                    <h3>📊 玩家状态</h3>
                    <div class="status-item">
                        <span class="status-label">❤️ 状态：</span>
                        <span id="health-status">健康</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">🎒 背包：</span>
                        <span id="inventory">空</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">🎭 技能：</span>
                        <span id="current-skills">无</span>
                    </div>
                </div>

                <div class="player-status">
                    <h3>📝 支线任务</h3>
                    <div id="side-quests"></div>
                </div>

                <div class="player-status">
                    <h3>🎯 成就</h3>
                    <div id="achievements-list"></div>
                </div>
            </div>
        </div>

        <!-- 结局界面 -->
        <div id="ending-screen" class="ending-screen">
            <h1 id="ending-title">结局标题</h1>
            <div id="ending-type" style="margin: 10px 0; font-weight: bold;"></div>
            <p class="ending-description" id="ending-description"></p>
            <div class="unlocked-skill" id="unlocked-skill" style="display: none;">
                <h3>🎭 解锁新技能</h3>
                <p id="new-skill" style="font-size: 1.3em; color: #e94560; font-weight: bold;"></p>
            </div>
            <button class="restart-btn" onclick="returnToMenu()">返回主菜单</button>
        </div>
    </div>

    <script>
        // ==================== 玩家管理系统 ====================
        const PlayerManager = {
            // 获取所有玩家列表
            getPlayers() {
                const players = localStorage.getItem('infiniteflow_players');
                return players ? JSON.parse(players) : [];
            },

            // 保存玩家列表
            savePlayers(players) {
                localStorage.setItem('infiniteflow_players', JSON.stringify(players));
            },

            // 创建新玩家
            createPlayer(name, isGuest = false) {
                const players = this.getPlayers();
                const playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const newPlayer = {
                    id: playerId,
                    name: name || (isGuest ? '游客' + Math.floor(Math.random() * 10000) : '未知玩家'),
                    isGuest: isGuest,
                    createdAt: new Date().toISOString(),
                    lastPlayed: new Date().toISOString(),
                    totalPlayTime: 0,
                    completedScenarios: [],
                    unlockedSkills: [],
                    achievements: []
                };

                players.push(newPlayer);
                this.savePlayers(players);
                
                // 初始化该玩家的存档空间
                this.initPlayerSaves(playerId);
                
                return newPlayer;
            },

            // 删除玩家
            deletePlayer(playerId) {
                let players = this.getPlayers();
                players = players.filter(p => p.id !== playerId);
                this.savePlayers(players);
                
                // 删除该玩家的所有存档
                for (let i = 0; i < 9; i++) {
                    localStorage.removeItem(`infiniteflow_save_${playerId}_${i}`);
                }
            },

            // 获取当前玩家
            getCurrentPlayer() {
                const currentPlayerId = sessionStorage.getItem('infiniteflow_current_player');
                if (!currentPlayerId) return null;
                
                const players = this.getPlayers();
                return players.find(p => p.id === currentPlayerId);
            },

            // 设置当前玩家
            setCurrentPlayer(playerId) {
                sessionStorage.setItem('infiniteflow_current_player', playerId);
            },

            // 更新玩家信息
            updatePlayer(playerId, updates) {
                const players = this.getPlayers();
                const index = players.findIndex(p => p.id === playerId);
                if (index !== -1) {
                    players[index] = { ...players[index], ...updates, lastPlayed: new Date().toISOString() };
                    this.savePlayers(players);
                }
            },

            // 初始化玩家存档空间
            initPlayerSaves(playerId) {
                // 不需要预先创建，使用时动态创建即可
            },

            // 保存游戏（特定玩家特定槽位）
            saveGame(playerId, slotIndex, saveData) {
                const key = `infiniteflow_save_${playerId}_${slotIndex}`;
                const saveInfo = {
                    ...saveData,
                    saveTime: new Date().toISOString(),
                    playerId: playerId,
                    slotIndex: slotIndex
                };
                localStorage.setItem(key, JSON.stringify(saveInfo));
            },

            // 读取游戏
            loadGame(playerId, slotIndex) {
                const key = `infiniteflow_save_${playerId}_${slotIndex}`;
                const saveData = localStorage.getItem(key);
                return saveData ? JSON.parse(saveData) : null;
            },

            // 获取所有存档槽位信息
            getAllSaves(playerId) {
                const saves = [];
                for (let i = 0; i < 9; i++) {
                    const save = this.loadGame(playerId, i);
                    saves.push({
                        slotIndex: i,
                        occupied: !!save,
                        ...save
                    });
                }
                return saves;
            },

            // 删除存档
            deleteSave(playerId, slotIndex) {
                const key = `infiniteflow_save_${playerId}_${slotIndex}`;
                localStorage.removeItem(key);
            }
        };

        // ==================== 全局状态 ====================
        let currentPlayer = null;
        let currentScenario = null;
        let gameInstance = null;

        // ==================== 界面函数 ====================

        // 初始化登录界面
        function initLoginScreen() {
            const players = PlayerManager.getPlayers();
            const container = document.getElementById('existing-players');
            
            if (players.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center;">暂无已有玩家</p>';
                return;
            }

            container.innerHTML = players.map(player => `
                <div class="player-item" onclick="selectPlayer('${player.id}')">
                    <div class="player-info">
                        <div class="player-name">${player.name} ${player.isGuest ? '<span style="color: #888; font-size: 0.8em;">(游客)</span>' : ''}</div>
                        <div class="player-stats">
                            剧本完成: ${player.completedScenarios.length} | 
                            技能: ${player.unlockedSkills.length} | 
                            成就: ${player.achievements.length}
                        </div>
                    </div>
                    <span class="player-delete" onclick="event.stopPropagation(); deletePlayer('${player.id}')">🗑️</span>
                </div>
            `).join('');
        }

        // 创建新玩家
        function createNewPlayer() {
            const name = document.getElementById('new-player-name').value.trim();
            if (!name) {
                alert('请输入玩家名称');
                return;
            }
            
            const player = PlayerManager.createPlayer(name);
            login(player);
        }

        // 创建游客
        function createGuestPlayer() {
            const player = PlayerManager.createPlayer(null, true);
            login(player);
        }

        // 选择已有玩家
        function selectPlayer(playerId) {
            const players = PlayerManager.getPlayers();
            const player = players.find(p => p.id === playerId);
            if (player) {
                login(player);
            }
        }

        // 删除玩家
        function deletePlayer(playerId) {
            if (!confirm('确定要删除这个玩家吗？所有存档都会被删除！')) {
                return;
            }
            PlayerManager.deletePlayer(playerId);
            initLoginScreen();
        }

        // 登录
        function login(player) {
            currentPlayer = player;
            PlayerManager.setCurrentPlayer(player.id);
            showMainMenu();
        }

        // 显示主菜单
        function showMainMenu() {
            hideAllScreens();
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('current-player-name').textContent = currentPlayer.name;
            
            // 检查是否有存档，决定是否禁用"继续游戏"
            const saves = PlayerManager.getAllSaves(currentPlayer.id);
            const hasSave = saves.some(s => s.occupied);
            const continueBtn = document.querySelector('.menu-btn[onclick="continueGame()"]');
            if (continueBtn) {
                continueBtn.disabled = !hasSave;
                continueBtn.style.opacity = hasSave ? '1' : '0.5';
            }
        }

        // 显示剧本选择
        function showScenarioSelect() {
            hideAllScreens();
            document.getElementById('scenario-select').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            loadScenarios();
        }

        // 加载剧本列表
        async function loadScenarios() {
            const grid = document.getElementById('scenario-grid');
            grid.innerHTML = '<p style="color: #888; text-align: center;">加载中...</p>';

            try {
                // 加载可用剧本
                const scenarios = [
                    { file: 'scenario-20250310.json', title: '逃离死城', type: '丧尸末日', desc: '2025年东京，T病毒泄露，带领队友逃离死亡都市' },
                    { file: 'scenario-20260310.json', title: '76号夜宴', type: '谍战悬疑', desc: '1942年上海，传递绝密胶卷，在76号的庆功宴上完成接头任务' }
                ];

                grid.innerHTML = scenarios.map(s => `
                    <div class="scenario-card" onclick="startNewGame('${s.file}')">
                        <div class="title">${s.title}</div>
                        <span class="type">${s.type}</span>
                        <div class="desc">${s.desc}</div>
                        <div class="meta">
                            <span>⏱️ 20-30分钟</span>
                            <span>📊 中等难度</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = `<p style="color: #ff4444;">加载失败: ${error.message}</p>`;
            }
        }

        // 显示存档菜单
        function showSaveMenu() {
            hideAllScreens();
            document.getElementById('save-menu').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            renderSaveSlots();
        }

        // 渲染存档槽位
        function renderSaveSlots() {
            const container = document.getElementById('save-slots');
            const saves = PlayerManager.getAllSaves(currentPlayer.id);

            container.innerHTML = saves.map((save, index) => `
                <div class="save-slot ${save.occupied ? 'occupied' : ''}" onclick="handleSaveSlotClick(${index})">
                    <div class="save-slot-number">存档 ${index + 1}</div>
                    <div class="save-slot-info">
                        ${save.occupied 
                            ? `${save.scenarioTitle || '未知剧本'}<br><small>${new Date(save.saveTime).toLocaleString()}</small>`
                            : '空槽位'
                        }
                    </div>
                </div>
            `).join('');
        }

        // 处理存档槽位点击
        function handleSaveSlotClick(slotIndex) {
            const save = PlayerManager.loadGame(currentPlayer.id, slotIndex);
            
            if (save) {
                // 有存档，询问是否读取
                if (confirm(`读取存档 ${slotIndex + 1}？\n剧本: ${save.scenarioTitle || '未知'}\n时间: ${new Date(save.saveTime).toLocaleString()}`)) {
                    loadSavedGame(slotIndex);
                }
            } else {
                // 空槽位，提示需要先开始游戏
                alert('空槽位\n\n请先开始游戏，在游戏中可以随时存档到这里。');
            }
        }

        // 继续游戏（读取最新存档）
        function continueGame() {
            const saves = PlayerManager.getAllSaves(currentPlayer.id);
            const latestSave = saves
                .filter(s => s.occupied)
                .sort((a, b) => new Date(b.saveTime) - new Date(a.saveTime))[0];
            
            if (latestSave) {
                loadSavedGame(latestSave.slotIndex);
            } else {
                alert('没有找到存档');
            }
        }

        // 开始新游戏
        async function startNewGame(scenarioFile) {
            try {
                hideAllScreens();
                document.getElementById('loading').style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';

                const response = await fetch(`scenarios/${scenarioFile}`);
                const scenario = await response.json();
                
                currentScenario = scenario;
                
                // 初始化游戏
                gameInstance = new InfiniteFlowGameEnhanced();
                gameInstance.loadScenario(scenario);
                
                // 自动保存到新槽位
                autoSave();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('game-container').style.display = 'grid';
                renderGame();
            } catch (error) {
                document.getElementById('loading').innerHTML = '加载失败: ' + error.message;
                console.error(error);
            }
        }

        // 读取存档
        async function loadSavedGame(slotIndex) {
            try {
                const save = PlayerManager.loadGame(currentPlayer.id, slotIndex);
                if (!save) {
                    alert('存档不存在');
                    return;
                }

                hideAllScreens();
                document.getElementById('loading').style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';

                // 加载剧本
                const response = await fetch(`scenarios/${save.scenarioFile}`);
                const scenario = await response.json();
                
                currentScenario = scenario;
                
                // 初始化游戏并恢复状态
                gameInstance = new InfiniteFlowGameEnhanced();
                gameInstance.loadScenario(scenario);
                gameInstance.restoreSaveData(save.gameState);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('game-container').style.display = 'grid';
                renderGame();
            } catch (error) {
                document.getElementById('loading').innerHTML = '读取存档失败: ' + error.message;
                console.error(error);
            }
        }

        // 自动保存
        function autoSave() {
            if (!gameInstance || !currentPlayer) return;
            
            const saveData = {
                scenarioFile: currentScenario.id === 'scenario-20250310' ? 'scenario-20250310.json' : 'scenario-20260310.json',
                scenarioTitle: currentScenario.title,
                gameState: gameInstance.getSaveData()
            };
            
            // 保存到第一个空槽位，或覆盖第一个槽位
            const saves = PlayerManager.getAllSaves(currentPlayer.id);
            const emptySlot = saves.findIndex(s => !s.occupied);
            const slotIndex = emptySlot !== -1 ? emptySlot : 0;
            
            PlayerManager.saveGame(currentPlayer.id, slotIndex, saveData);
        }

        // 快速存档
        function quickSave() {
            autoSave();
            alert('💾 游戏已保存');
        }

        // 返回
        function goBack() {
            if (confirm('返回主菜单？未保存的进度将丢失。')) {
                returnToMenu();
            }
        }

        // 返回主菜单
        function returnToMenu() {
            hideAllScreens();
            showMainMenu();
        }

        // 切换玩家
        function switchPlayer() {
            sessionStorage.removeItem('infiniteflow_current_player');
            currentPlayer = null;
            gameInstance = null;
            currentScenario = null;
            hideAllScreens();
            document.getElementById('login-screen').style.display = 'block';
            initLoginScreen();
        }

        // 隐藏所有界面
        function hideAllScreens() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('scenario-select').style.display = 'none';
            document.getElementById('save-menu').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('ending-screen').style.display = 'none';
            document.getElementById('ending-screen').className = 'ending-screen';
        }

        // ==================== 游戏渲染函数 ====================

        function renderGame() {
            if (!gameInstance) return;
            
            const currentEvent = gameInstance.getCurrentEvent();
            const scenario = gameInstance.currentScenario;

            // Update quest
            document.getElementById('main-quest-text').textContent = scenario.mainQuest.description;

            // Update scene
            const scene = currentEvent.scene;
            document.getElementById('scene-text').textContent = scene.description;
            document.getElementById('scene-img').src = scene.image || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300"><rect fill="#2a2a4a" width="800" height="300"/><text x="400" y="150" text-anchor="middle" fill="#888" font-size="20">场景图片生成中...</text></svg>');
            document.getElementById('system-overlay').textContent = scene.systemMessage || '';

            // Update NPCs
            const npcList = document.getElementById('npc-list');
            npcList.innerHTML = '';
            currentEvent.npcsPresent.forEach(npcId => {
                const npc = scenario.characters.find(c => c.id === npcId);
                if (npc) {
                    const npcEl = document.createElement('div');
                    npcEl.className = 'npc-item';
                    npcEl.innerHTML = `
                        <div class="npc-name">${npc.name}</div>
                        <div class="npc-role">${npc.role}</div>
                        <div style="font-size: 0.9em; color: #888;">${npc.personality}</div>
                    `;
                    npcList.appendChild(npcEl);
                }
            });

            // Update choices
            const choicesEl = document.getElementById('choices');
            choicesEl.innerHTML = '';
            currentEvent.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';

                if (option.deathChance > 0.4) {
                    btn.classList.add('danger');
                }

                btn.innerHTML = `<strong>${option.text}</strong>`;
                btn.onclick = () => makeChoice(option);
                choicesEl.appendChild(btn);
            });

            // Update player status
            document.getElementById('health-status').textContent = gameInstance.player.health > 80 ? '健康' : gameInstance.player.health > 50 ? '受伤' : '危险';
            document.getElementById('inventory').textContent = gameInstance.player.inventory.length > 0 ? gameInstance.player.inventory.join(', ') : '空';
            document.getElementById('current-skills').textContent = gameInstance.player.skills.length > 0 ? gameInstance.player.skills.join(', ') : '无';

            // Update side quests
            const sideQuestsEl = document.getElementById('side-quests');
            sideQuestsEl.innerHTML = '';
            scenario.sideQuests.forEach(quest => {
                const questEl = document.createElement('div');
                questEl.className = 'status-item';
                questEl.innerHTML = `
                    <div style="font-weight: bold; color: #e94560;">${quest.title}</div>
                    <div style="font-size: 0.9em; margin-top: 5px;">${quest.description}</div>
                    ${quest.hidden ? '<div style="color: #ffd700; font-size: 0.8em; margin-top: 5px;">隐藏任务</div>' : ''}
                `;
                sideQuestsEl.appendChild(questEl);
            });

            // Update achievements
            const achievementsEl = document.getElementById('achievements-list');
            achievementsEl.innerHTML = gameInstance.achievements
                .filter(a => a.completed)
                .map(a => `<div style="font-size: 0.9em; color: #00ff88;">✓ ${a.title}</div>`)
                .join('') || '<div style="color: #666;">暂无成就</div>';
        }

        function makeChoice(option) {
            const result = gameInstance.makeChoice(option.id);

            if (result.type === 'death') {
                showEnding(result.ending);
            } else {
                // 自动保存
                autoSave();
                
                const ending = gameInstance.checkEnding();
                if (ending) {
                    showEnding(ending);
                } else {
                    renderGame();
                }
            }
        }

        function showEnding(ending) {
            document.getElementById('game-container').style.display = 'none';
            const endingScreen = document.getElementById('ending-screen');
            endingScreen.style.display = 'block';
            endingScreen.className = 'ending-screen ending-' + ending.type;

            document.getElementById('ending-title').textContent = ending.title;
            document.getElementById('ending-type').textContent = ending.type === 'good' ? '🌟 好结局' : ending.type === 'bad' ? '💀 坏结局' : '✨ 隐藏结局';
            document.getElementById('ending-description').textContent = ending.description;

            if (ending.unlockSkill) {
                document.getElementById('unlocked-skill').style.display = 'block';
                document.getElementById('new-skill').textContent = ending.unlockSkill;
                gameInstance.player.skills.push(ending.unlockSkill);
                
                // 更新玩家解锁的技能
                if (currentPlayer) {
                    const newSkills = [...new Set([...currentPlayer.unlockedSkills, ending.unlockSkill])];
                    PlayerManager.updatePlayer(currentPlayer.id, { unlockedSkills: newSkills });
                }
            } else {
                document.getElementById('unlocked-skill').style.display = 'none';
            }

            // 记录完成的剧本
            if (currentPlayer && currentScenario) {
                const completed = [...new Set([...currentPlayer.completedScenarios, currentScenario.id])];
                PlayerManager.updatePlayer(currentPlayer.id, { completedScenarios: completed });
            }
        }

        // ==================== 初始化 ====================
        
        // 检查是否有已登录的玩家
        const savedPlayer = PlayerManager.getCurrentPlayer();
        if (savedPlayer) {
            currentPlayer = savedPlayer;
            showMainMenu();
        } else {
            initLoginScreen();
        }
    </script>
    
    <!-- 加载游戏引擎 -->
    <script src="engine-enhanced.js"></script>
</body>
</html>
